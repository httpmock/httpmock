# Fast lane: runs on every pull request and every push to master.
#
# CI is split into three lanes (see upstream issue #219):
#   - ci.yml (this file): lint, pairwise feature compile checks, tests for
#     representative feature sets, coverage. Fast enough to block PRs.
#   - feature-matrix.yml: full test suite across the feature power set plus
#     Docker integration. Master pushes, nightly, and on demand.
#   - platform.yml: macOS/Windows and beta/nightly toolchains. Weekly.
name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Format and lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Installs the MSRV toolchain pinned in rust-toolchain.toml and enables
      # dependency caching (built into this action).
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - run: cargo fmt --all -- --check

      # Warning severity is owned by the crate's lint configuration, so
      # warnings are deliberately not escalated to errors here.
      - run: cargo clippy --all-targets --all-features

  feature-combinations:
    name: Check feature combinations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      # Fetches a prebuilt binary instead of compiling from source.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack

      # Compile-check every feature alone and every feature pair. Feature
      # gating mistakes are almost always compile errors, so this cheap check
      # catches most of what full matrix *testing* would. cargo-hack drops
      # combinations that are equivalent under feature implications (e.g.
      # record -> proxy -> remote-https -> remote), keeping the run small.
      # The same power set is fully tested in feature-matrix.yml.
      - run: cargo hack check --feature-powerset --depth 2 --no-dev-deps

  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Three representative feature sets; the full power set is covered by
      # feature-matrix.yml. "standalone" already implies remote, remote-https,
      # record, proxy, http2 and cookies.
      matrix:
        include:
          - name: default
            args: ""
          - name: standalone
            args: --features standalone
          - name: all-features
            args: --all-features
    steps:
      - uses: actions/checkout@v6

      # HTTPS tests validate the bundled test certificates against the OS
      # trust store.
      - name: Trust the repository's test CA
        run: |
          sudo cp certs/ca.pem /usr/local/share/ca-certificates/httpmock-test-ca.crt
          sudo update-ca-certificates

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      # Default test-thread parallelism. Tests that talk to the standalone
      # server share one in-process simulation per test binary, which handles
      # concurrent requests fine.
      - run: cargo test ${{ matrix.args }}

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    container:
      image: xd009642/tarpaulin:develop-nightly
      options: --security-opt seccomp=unconfined
    steps:
      - uses: actions/checkout@v6

      # A single representative feature set keeps coverage cheap enough to
      # run per PR. The exhaustive per-combination configs remain available
      # locally via `make coverage-full` (tarpaulin.full.toml).
      - name: Generate code coverage
        run: cargo +nightly tarpaulin --workspace --features remote --timeout 120 --out Xml

      - name: Upload to codecov.io
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Ensures the standalone server image still builds. Nothing is
      # published here; releases are handled by docker-release.yml.
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: httpmock/httpmock:build
