# Fast lane: runs on every pull request and every push to master.
#
# CI is split into three lanes:
#   - ci.yml (this file): lint, pairwise feature compile checks, MSRV, tests
#     for representative feature sets, coverage, dependency policy. Fast
#     enough to block PRs.
#   - feature-matrix.yml: full test suite across the feature power set plus
#     Docker integration. Master pushes, nightly, and on demand.
#   - platform.yml: macOS/Windows and beta/nightly toolchains. Weekly.
name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # pin to a recent nightly for up-to-date but reproducible results
  NIGHTLY_TOOLCHAIN: nightly-2026-07-01

jobs:

  formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.NIGHTLY_TOOLCHAIN }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.NIGHTLY_TOOLCHAIN }}
          components: clippy
          rustflags: ""  # clears default "-D warnings" to ensure consistency between local dev and CI
      - run: cargo clippy --all-targets --all-features

  feature-combinations:
    name: Check feature combinations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack

      # Compile-check every feature alone and every feature pair. Feature
      # gating mistakes are almost always compile errors, so this cheap check
      # catches most of what full matrix *testing* would. cargo-hack drops
      # combinations that are equivalent under feature implications (e.g.
      # record -> proxy -> remote-https -> remote), keeping the run small.
      # The same power set is fully tested in feature-matrix.yml.
      #
      # Without dev-dependencies first: dev-dep feature unification can mask
      # gating bugs in the published crate.
      - run: cargo hack check --feature-powerset --depth 2 --no-dev-deps

      # Then with dev-dependencies and all targets, so feature-gated code in
      # integration tests and examples is checked as well.
      - run: cargo hack check --feature-powerset --depth 2 --all-targets

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack

      # Checks that every feature builds on the rust-version declared in
      # Cargo.toml. Dev dependencies are exempt from the MSRV.
      - run: cargo hack check --rust-version --each-feature --no-dev-deps

  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Three representative feature sets; the full power set is covered by
      # feature-matrix.yml. "standalone" already implies remote, remote-https,
      # record, proxy, http2 and cookies.
      matrix:
        include:
          - name: default
            args: ""
          - name: standalone
            args: --features standalone
          - name: all-features
            args: --all-features
    steps:
      - uses: actions/checkout@v6

      # HTTPS tests validate the bundled test certificates against the OS
      # trust store.
      - name: Trust the repository's test CA
        run: |
          sudo cp certs/ca.pem /usr/local/share/ca-certificates/httpmock-test-ca.crt
          sudo update-ca-certificates

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # Each matrix row compiles a different feature set, so each caches
          # separately.
          cache-key: ${{ matrix.name }}
      - run: cargo test ${{ matrix.args }}

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      # Source-based coverage on the pinned toolchain. The standalone
      # superset gives one cheap run that covers most feature-gated code.
      - name: Generate code coverage
        run: cargo llvm-cov --features standalone --lcov --output-path lcov.info

      - name: Upload to codecov.io
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: lcov.info
          fail_ci_if_error: true

  deny:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Only the deterministic checks run here. Security
      # advisories drift over time independently of the code, so they are
      # checked nightly in feature-matrix.yml instead of failing unrelated
      # PRs.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Ensures the standalone server image still builds. Nothing is
      # published here; releases are handled by docker-release.yml.
      - run: docker build -t httpmock/httpmock:build .
